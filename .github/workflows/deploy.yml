name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permite disparar el deploy manualmente desde la UI de GitHub

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; cancela runs anteriores en cola (no el activo)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── JOB 1: Build ──────────────────────────────────────────────────
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── JOB 2: Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
